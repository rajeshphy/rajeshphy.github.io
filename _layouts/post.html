---
layout: default
---

<article class="post">
  <header class="post-hero">
    <p class="eyebrow">{{ page.date | date: "%d %b %Y" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.summary %}
      <p class="summary">{{ page.summary }}</p>
    {% endif %}
    {% if page.tags %}
      <div class="tag-row">
        {% for tag in page.tags %}
          <span>{{ tag }}</span>
        {% endfor %}
      </div>
    {% endif %}
  </header>
  {{ content }}
</article>

{% include comments.html %}
