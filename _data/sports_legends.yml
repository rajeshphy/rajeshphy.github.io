- group: "Indian and Jharkhand Legends"
  anchor: "indian-and-jharkhand-legends"
  legends:
    - name: "MS Dhoni"
      sport: "Cricket"
      bio: "Ranchi's most famous cricket figure, Dhoni became a model for wicket-keeping, limited-overs captaincy, finishing under pressure, and calm match management."
      source: "ESPNcricinfo profile"
      url: "https://www.espncricinfo.com/cricketers/ms-dhoni-28081"
    - name: "Deepika Kumari"
      sport: "Archery"
      bio: "Born in Jharkhand, Deepika Kumari is a recurve archer whose career helps learners understand ranking rounds, shoot-offs, Olympic qualification, and precision-sport pressure."
      source: "World Archery profile"
      url: "https://www.worldarchery.sport/profile/5147/deepika-kumari"
    - name: "Jaipal Singh Munda"
      sport: "Hockey"
      bio: "A Jharkhand historical figure, Jaipal Singh Munda captained India's 1928 Olympic hockey team and later became a major public voice for Adivasi identity and representation."
      source: "Constitution of India profile"
      url: "https://www.constitutionofindia.net/members/jaipal-singh/"
    - name: "Major Dhyan Chand"
      sport: "Hockey"
      bio: "A central name in Indian hockey history, Dhyan Chand is remembered for extraordinary stick control, Olympic success, and the language of classic Indian field hockey dominance."
      source: "Wikipedia biography"
      url: "https://en.wikipedia.org/wiki/Dhyan_Chand"
    - name: "Sachin Tendulkar"
      sport: "Cricket"
      bio: "Tendulkar is the essential reference for batting technique, longevity, records, pressure, and how cricket heroes become national cultural figures in India."
      source: "ESPNcricinfo profile"
      url: "https://www.espncricinfo.com/cricketers/sachin-tendulkar-35320"
    - name: "P. V. Sindhu"
      sport: "Badminton"
      bio: "Sindhu is a key Indian badminton reference for Olympic medals, world championship conversation, rally discipline, mental resilience, and women's singles terminology."
      source: "BWF profile"
      url: "https://bwfbadminton.com/player/73173/pusarla-v-sindhu"
    - name: "Mary Kom"
      sport: "Boxing"
      bio: "Mary Kom is an Indian boxing legend whose story teaches weight categories, world championships, Olympic medals, combat-sport endurance, and late-career resilience."
      source: "Wikipedia biography"
      url: "https://en.wikipedia.org/wiki/Mary_Kom"
    - name: "Neeraj Chopra"
      sport: "Athletics"
      bio: "Neeraj Chopra made javelin part of mainstream Indian sports talk, giving learners vocabulary for throws, qualification marks, personal bests, finals, and athletics medals."
      source: "Olympics profile"
      url: "https://olympics.com/en/athletes/neeraj-chopra"
- group: "World Legends"
  anchor: "world-legends"
  legends:
    - name: "Pelé"
      sport: "Football"
      bio: "Pelé is a foundation name in world football conversation, often used when discussing World Cups, attacking flair, legacy, and the global spread of football culture."
      source: "Britannica biography"
      url: "https://www.britannica.com/biography/Pele-Brazilian-athlete"
    - name: "Lionel Messi"
      sport: "Football"
      bio: "Messi is a modern football reference for dribbling, playmaking, club legacy, international redemption, and how individual brilliance fits within team structure."
      source: "Britannica biography"
      url: "https://www.britannica.com/biography/Lionel-Messi"
    - name: "Cristiano Ronaldo"
      sport: "Football"
      bio: "Ronaldo is central to conversations about goal scoring, athletic preparation, Champions League culture, international football, longevity, and fan rivalry."
      source: "Britannica biography"
      url: "https://www.britannica.com/biography/Cristiano-Ronaldo"
    - name: "Serena Williams"
      sport: "Tennis"
      bio: "Serena Williams is essential for tennis vocabulary around serve power, Grand Slams, dominance, comebacks, and the pressure of individual sport."
      source: "WTA profile"
      url: "https://www.wtatennis.com/players/230234/serena-williams"
    - name: "Roger Federer"
      sport: "Tennis"
      bio: "Federer helps learners understand tennis elegance, grass-court play, Grand Slam rivalries, one-handed backhand language, and career longevity."
      source: "ATP profile"
      url: "https://www.atptour.com/en/players/roger-federer/f324/overview"
    - name: "Usain Bolt"
      sport: "Athletics"
      bio: "Bolt is the global shorthand for sprinting, Olympic spectacle, world records, starts, acceleration, top speed, and the meaning of peak performance."
      source: "Olympics profile"
      url: "https://olympics.com/en/athletes/usain-bolt"
    - name: "Michael Jordan"
      sport: "Basketball"
      bio: "Jordan is the key basketball legend for scoring, championships, competitive mentality, NBA culture, branding, and the idea of clutch performance."
      source: "NBA history profile"
      url: "https://www.nba.com/history/legends/profiles/michael-jordan"
    - name: "Muhammad Ali"
      sport: "Boxing"
      bio: "Ali is a boxing and cultural reference for footwork, heavyweight boxing, public personality, courage, rivalry, and athlete activism."
      source: "Britannica biography"
      url: "https://www.britannica.com/biography/Muhammad-Ali-boxer"
