# Practical post audit

## Rubric

- 2 points: physical starting point and first-principles motivation.
- 2 points: self-contained derivation or explanation of the working relation.
- 2 points: clear connection between apparatus, controlled quantity, and measured quantity.
- 2 points: complete observations, calculation, and result consistent with the theory.
- 1 point: labelled figure and graph where the experiment requires one.
- 1 point: exam-ready presentation, precautions, viva answers, and Maxima check where calculation is non-trivial.

