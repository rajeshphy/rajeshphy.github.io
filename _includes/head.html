<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{% seo %}
<link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
<link rel="icon" href="{{ '/assets/icons/logo.png' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
<script src="{{ '/assets/js/inline-search.js' | relative_url }}" data-search="{{ '/search.json' | relative_url }}" defer></script>
<script src="{{ '/assets/js/share.js' | relative_url }}" defer></script>
<script src="{{ '/assets/js/code-copy.js' | relative_url }}" defer></script>
{% if page.math %}
<script>
  window.MathJax = {
    tex: { inlineMath: [["$", "$"], ["\\(", "\\)"]], displayMath: [["$$", "$$"], ["\\[", "\\]"]] },
    svg: { fontCache: "global" }
  };
</script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
{% endif %}
