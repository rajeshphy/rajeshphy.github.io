<header class="site-header">
  {% assign site_name = site.author.name | default: site.title %}
  <a class="brand" href="{{ '/' | relative_url }}">
    <span class="brand-mark">RK</span>
    <span class="brand-copy">
      <strong>{{ site_name }}</strong>
      <small>Physical Science</small>
    </span>
  </a>
  <nav class="main-nav" aria-label="Main navigation">
    <a {% if page.url == "/" %}class="active"{% endif %} href="{{ '/' | relative_url }}"> 🏠 </a>
    <a {% if page.url == "/about/" %}class="active"{% endif %} href="{{ '/notes-archive/' | relative_url }}">Notes</a>
    <a {% if page.url contains "/ref/" %}class="active"{% endif %} href="{{ '/ref/' | relative_url }}">Ref</a>
    <a {% if page.url == "/tags/" %}class="active"{% endif %} href="{{ '/tags/' | relative_url }}">Tags</a>
    <button class="nav-search-toggle" type="button" aria-expanded="false" aria-controls="nav-search-input">🔎︎</button>
    <label class="nav-search" aria-label="Search posts">
      <input id="nav-search-input" type="search" placeholder="Search posts" autocomplete="off">
    </label>
    <div id="nav-search-results" class="nav-search-results" aria-live="polite"></div>
  </nav>
  <div class="icon-row header-icons" aria-label="Contact links">
    {% for icon in site.data.header_icons %}
      <a class="icon-link" href="{{ icon.href }}" aria-label="{{ icon.label }}">
        <img src="{{ icon.icon | relative_url }}" alt="" aria-hidden="true">
      </a>
    {% endfor %}
  </div>
</header>
