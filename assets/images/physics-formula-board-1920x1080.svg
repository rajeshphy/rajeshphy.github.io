  <g font-family="Georgia, 'Times New Roman', serif" fill="#f6fbf7" opacity=".96" filter="url(#softChalk)">
    <text x="90" y="330" font-size="92" font-style="italic">E = mc<tspan baseline-shift="super" font-size="52">2</tspan></text>
    <text x="545" y="245" font-size="56" font-style="italic">i&#8463; &#8706;&#968;/&#8706;t = H&#968;</text>
    <text x="1110" y="152" font-size="48" font-style="italic">G<tspan baseline-shift="sub" font-size="28">&#956;&#957;</tspan> + &#923;g<tspan baseline-shift="sub" font-size="28">&#956;&#957;</tspan> = 8&#960;GT<tspan baseline-shift="sub" font-size="28">&#956;&#957;</tspan>/c<tspan baseline-shift="super" font-size="28">4</tspan></text>
    <text x="132" y="515" font-size="50" font-style="italic">[x, p] = i&#8463;</text>
    <text x="600" y="500" font-size="58" font-style="italic">(&#8463;c &#945; . p + &#946;mc<tspan baseline-shift="super" font-size="32">2</tspan>)&#968; = E&#968;</text>
    <text x="1110" y="340" font-size="62" font-style="italic">(&#947;<tspan baseline-shift="super" font-size="34">&#956;</tspan>&#8706;<tspan baseline-shift="sub" font-size="30">&#956;</tspan> + m)&#968; = 0</text>
    <text x="130" y="705" font-size="48" font-style="italic">&#8711; . E = &#961;/&#949;<tspan baseline-shift="sub" font-size="28">0</tspan></text>
    <text x="545" y="755" font-size="48" font-style="italic">&#8711; x B = &#956;<tspan baseline-shift="sub" font-size="28">0</tspan>J + &#956;<tspan baseline-shift="sub" font-size="28">0</tspan>&#949;<tspan baseline-shift="sub" font-size="28">0</tspan> &#8706;E/&#8706;t</text>
    <text x="1170" y="710" font-size="62" font-style="italic">&#916;x &#916;p &#8805; &#8463;/2</text>
    <text x="520" y="950" font-size="42" font-style="italic">S = &#8747; L(q, q&#775;, t) dt</text>
    <text x="1040" y="950" font-size="42" font-style="italic">Z = &#8747; exp(iS/&#8463;) Dq</text>
  </g>
  <g font-family="Georgia, 'Times New Roman', serif" fill="#f6fbf7" opacity=".24" filter="url(#softChalk)">
    <text x="95" y="960" font-size="34" font-style="italic">&#8706;<tspan baseline-shift="sub" font-size="22">&#956;</tspan>F<tspan baseline-shift="super" font-size="22">&#956;&#957;</tspan> = &#956;<tspan baseline-shift="sub" font-size="22">0</tspan>J<tspan baseline-shift="super" font-size="22">&#957;</tspan></text>
    <text x="1450" y="1000" font-size="34" font-style="italic">F = ma</text>
    <text x="1560" y="590" font-size="36" font-style="italic">PV = nRT</text>
