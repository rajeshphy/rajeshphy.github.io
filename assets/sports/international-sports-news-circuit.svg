<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">International sports news circuit</title>
  <desc id="desc">A conceptual map showing India connected to official schedules, live scores, rankings, match reports, legends, and global tournaments.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="0.56" stop-color="#eef8f5"/>
      <stop offset="1" stop-color="#fff6df"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1f2f2d" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1200" height="620" rx="28" fill="url(#bg)"/>
  <g fill="none" stroke="#0b6d68" stroke-width="3" stroke-linecap="round" opacity=".34">
    <path d="M600 310 C455 170 330 146 188 180"/>
    <path d="M600 310 C748 168 884 140 1010 178"/>
    <path d="M600 310 C742 350 882 388 1026 466"/>
    <path d="M600 310 C458 354 326 398 176 464"/>
    <path d="M600 310 C600 210 600 146 600 82"/>
    <path d="M600 310 C600 410 600 472 600 538"/>
  </g>
  <g filter="url(#soft-shadow)">
    <circle cx="600" cy="310" r="104" fill="#075f5d"/>
    <circle cx="600" cy="310" r="82" fill="#0b7772"/>
    <text x="600" y="292" text-anchor="middle" fill="#fffdf8" font-family="Georgia, serif" font-size="38" font-weight="700">INDIA</text>
    <text x="600" y="332" text-anchor="middle" fill="#eaf7f2" font-family="Arial, sans-serif" font-size="19" font-weight="700">vs the world</text>
  </g>
  <g font-family="Arial, sans-serif" filter="url(#soft-shadow)">
    <g transform="translate(88 126)">
      <rect width="235" height="108" rx="18" fill="#fffdf8" stroke="#e2d2ad"/>
      <text x="118" y="42" text-anchor="middle" fill="#8a6411" font-size="20" font-weight="800">Official Schedule</text>
      <text x="118" y="73" text-anchor="middle" fill="#31413f" font-size="15">fixtures, squads, venue</text>
    </g>
    <g transform="translate(482 38)">
      <rect width="236" height="108" rx="18" fill="#fffdf8" stroke="#cde3de"/>
      <text x="118" y="42" text-anchor="middle" fill="#075f5d" font-size="20" font-weight="800">Global Tournaments</text>
      <text x="118" y="73" text-anchor="middle" fill="#31413f" font-size="15">World Cup, Olympics, tours</text>
    </g>
    <g transform="translate(878 126)">
      <rect width="238" height="108" rx="18" fill="#fffdf8" stroke="#e2d2ad"/>
      <text x="119" y="42" text-anchor="middle" fill="#8a6411" font-size="20" font-weight="800">Live Scores</text>
      <text x="119" y="73" text-anchor="middle" fill="#31413f" font-size="15">score, table, momentum</text>
    </g>
    <g transform="translate(88 414)">
      <rect width="235" height="108" rx="18" fill="#fffdf8" stroke="#cde3de"/>
      <text x="118" y="42" text-anchor="middle" fill="#075f5d" font-size="20" font-weight="800">Match Reports</text>
      <text x="118" y="73" text-anchor="middle" fill="#31413f" font-size="15">turning point, context</text>
    </g>
    <g transform="translate(482 476)">
      <rect width="236" height="108" rx="18" fill="#fffdf8" stroke="#e2d2ad"/>
      <text x="118" y="42" text-anchor="middle" fill="#8a6411" font-size="20" font-weight="800">Legends Bank</text>
      <text x="118" y="73" text-anchor="middle" fill="#31413f" font-size="15">names, eras, rivalries</text>
    </g>
    <g transform="translate(878 414)">
      <rect width="238" height="108" rx="18" fill="#fffdf8" stroke="#cde3de"/>
      <text x="119" y="42" text-anchor="middle" fill="#075f5d" font-size="20" font-weight="800">Rankings</text>
      <text x="119" y="73" text-anchor="middle" fill="#31413f" font-size="15">qualification, seeding</text>
    </g>
  </g>
  <g fill="#c58b12" opacity=".82">
    <circle cx="378" cy="158" r="7"/>
    <circle cx="600" cy="166" r="7"/>
    <circle cx="824" cy="158" r="7"/>
    <circle cx="382" cy="462" r="7"/>
    <circle cx="600" cy="456" r="7"/>
    <circle cx="820" cy="462" r="7"/>
  </g>
</svg>
